<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aula Virtual Servienvia — Mi aprendizaje</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1b1c20; --muted:#6a6f73; --line:#e7e3f0; --bg:#fbfaff; --card:#ffffff;
  --brand:#5b34d6; --brand-soft:#efe9fd; --brand-dark:#4a28b8;
  --accent:#16a37a; --accent-soft:#e6f7f0; --amber:#e8a317; --amber-soft:#fdf2e3;
  --red:#d6345b; --red-soft:#fdeef1;
  --shadow:0 14px 40px -22px rgba(60,30,140,.45);
  --shadow-sm:0 6px 20px -14px rgba(60,30,140,.4);
  --r:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);background:var(--bg);line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:'Fraunces',serif;line-height:1.08;font-weight:900;letter-spacing:-.02em}
a{color:inherit;text-decoration:none}
button{font-family:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px}

header{position:sticky;top:0;z-index:50;background:rgba(251,250,255,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;gap:20px;height:70px}
.logo{font-family:'Fraunces',serif;font-weight:900;font-size:25px;color:var(--brand);display:flex;align-items:center;gap:8px}
.logo .dot{width:11px;height:11px;border-radius:50%;background:var(--accent)}
.nav-link{font-weight:600;font-size:14.5px;cursor:pointer;color:var(--muted)}
.nav-link:hover{color:var(--brand)}
.spacer{flex:1}
.greet-h{display:flex;align-items:center;gap:10px}
.greet-h .av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--brand),#9b6dff);display:grid;place-items:center;color:#fff;font-weight:700;font-size:14px}
.greet-h b{font-size:14px}
.logout{background:none;border:1.5px solid var(--line);border-radius:999px;padding:8px 16px;font-weight:600;font-size:13.5px;cursor:pointer;color:var(--muted)}
.logout:hover{border-color:var(--red);color:var(--red);background:var(--red-soft)}

.hero{padding:34px 0 8px}
.hero h1{font-size:clamp(28px,3.4vw,38px);margin-bottom:4px}
.hero p{color:var(--muted);font-size:15.5px}

/* RACHAS / RESUMEN */
.top-cards{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:18px;margin:26px 0 8px}
@media(max-width:860px){.top-cards{grid-template-columns:1fr}}
.streak{background:linear-gradient(135deg,#2a1d52,#5b34d6);color:#fff;border-radius:22px;padding:24px 26px;position:relative;overflow:hidden}
.streak::after{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.08);right:-60px;top:-60px}
.streak .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;position:relative;z-index:2}
.streak .flame{display:flex;align-items:center;gap:12px}
.streak .flame .n{font-family:'Fraunces',serif;font-size:42px;font-weight:900;line-height:1}
.streak .flame small{font-size:13px;opacity:.85;display:block}
.streak .ico{width:50px;height:50px;border-radius:14px;background:rgba(255,255,255,.16);display:grid;place-items:center}
.week{display:flex;gap:8px;position:relative;z-index:2}
.day{flex:1;text-align:center}
.day .d{width:100%;aspect-ratio:1;max-width:38px;margin:0 auto 6px;border-radius:11px;background:rgba(255,255,255,.12);display:grid;place-items:center;font-size:13px;font-weight:700;transition:.2s}
.day.on .d{background:var(--accent);color:#fff}
.day.today .d{box-shadow:0 0 0 2px #fff}
.day span{font-size:11px;opacity:.8}
.mini{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:24px;display:flex;flex-direction:column;justify-content:center}
.mini .ic{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;margin-bottom:14px}
.mini .n{font-family:'Fraunces',serif;font-weight:900;font-size:32px;line-height:1}
.mini .l{color:var(--muted);font-size:13.5px;margin-top:3px}
.streak .reg{margin-top:18px;position:relative;z-index:2}
.streak .reg button{background:rgba(255,255,255,.16);color:#fff;border:none;border-radius:999px;padding:9px 18px;font-weight:700;font-size:13.5px;cursor:pointer;transition:.18s;display:inline-flex;align-items:center;gap:7px}
.streak .reg button:hover{background:rgba(255,255,255,.28)}

/* TABS */
.tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin:34px 0 0;overflow-x:auto}
.tab{background:none;border:none;padding:13px 18px;font:inherit;font-weight:700;font-size:14.5px;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:.15s}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.tab .count{background:var(--brand-soft);color:var(--brand);font-size:11px;padding:2px 8px;border-radius:999px;margin-left:6px}

/* FILTERS */
.filters{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin:22px 0}
.fsearch{flex:1;min-width:200px;display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:10px 15px}
.fsearch:focus-within{border-color:var(--brand);box-shadow:0 0 0 4px var(--brand-soft)}
.fsearch input{border:none;outline:none;font:inherit;font-size:14px;width:100%;background:none}
.fsearch svg{color:var(--muted);flex:none}
.filters select{font:inherit;font-size:14px;padding:10px 14px;border:1.5px solid var(--line);border-radius:12px;background:var(--card);cursor:pointer;outline:none}
.filters select:focus{border-color:var(--brand)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding-bottom:50px}
@media(max-width:860px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;transition:.2s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.thumb{height:130px;position:relative}
.thumb .tag{position:absolute;top:10px;left:10px;background:#fff;color:var(--brand);font-size:11px;font-weight:700;padding:5px 10px;border-radius:999px}
.thumb .fav{position:absolute;top:9px;right:9px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.9);border:none;cursor:pointer;display:grid;place-items:center;color:var(--muted);transition:.15s}
.thumb .fav:hover{color:var(--amber)}
.thumb .fav.on{color:var(--amber)}
.body{padding:16px;display:flex;flex-direction:column;flex:1}
.card h3{font-family:'Plus Jakarta Sans';font-weight:700;font-size:15.5px;line-height:1.3;margin-bottom:4px;letter-spacing:0}
.card .tutor{color:var(--muted);font-size:13px;margin-bottom:14px}
.progress{height:8px;border-radius:99px;background:var(--brand-soft);overflow:hidden;margin-bottom:7px}
.progress .bar{height:100%;border-radius:99px;background:var(--brand);transition:width .5s}
.progress .bar.done{background:var(--accent)}
.prow{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--muted);margin-bottom:14px}
.prow b{color:var(--ink)}
.acts{display:flex;gap:8px;margin-top:auto}
.btn-cont{flex:1;background:var(--brand);color:#fff;border:none;border-radius:10px;padding:10px;font-weight:700;font-size:13.5px;cursor:pointer;transition:.18s}
.btn-cont:hover{background:var(--brand-dark)}
.btn-cont.done{background:var(--accent-soft);color:#0e7a5a}
.ic-act{width:40px;border:1.5px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;display:grid;place-items:center;color:var(--muted);transition:.15s}
.ic-act:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}

.state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
.state .ic{width:72px;height:72px;border-radius:50%;background:var(--brand-soft);display:grid;place-items:center;margin:0 auto 16px;color:var(--brand)}
.state h3{color:var(--ink);font-size:20px;margin-bottom:6px}
.state a{color:var(--brand);font-weight:700;cursor:pointer}
.skel{height:260px;border-radius:var(--r);background:linear-gradient(90deg,#ece8f5 25%,#f6f3fc 50%,#ece8f5 75%);background-size:200% 100%;animation:sh 1.4s infinite}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(20,15,40,.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px;z-index:100}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:22px;max-width:400px;width:100%;padding:30px;box-shadow:0 30px 60px -20px rgba(0,0,0,.4);position:relative;animation:pop .3s}
@keyframes pop{from{transform:scale(.93);opacity:0}to{transform:scale(1)}}
.modal h2{font-size:22px;margin-bottom:4px}
.modal .msub{color:var(--muted);font-size:14px;margin-bottom:20px}
.modal label{display:block;font-weight:600;font-size:13.5px;margin-bottom:7px}
.modal input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;font:inherit;font-size:15px;outline:none;background:var(--bg)}
.modal input:focus{border-color:var(--brand);box-shadow:0 0 0 4px var(--brand-soft);background:#fff}
.modal .chips{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.modal .chips button{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;font:inherit;font-weight:600;font-size:13px;cursor:pointer}
.modal .chips button:hover{border-color:var(--brand);color:var(--brand)}
.x{position:absolute;top:16px;right:18px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:24px}
.modal-actions{display:flex;gap:10px;margin-top:24px}
.modal-actions button{flex:1;border:none;border-radius:999px;padding:13px;font:inherit;font-weight:700;font-size:14px;cursor:pointer}
.b-ghost{background:none;border:1.5px solid var(--line)!important;color:var(--ink)}
.b-solid{background:var(--brand);color:#fff}
.b-solid:hover{background:var(--brand-dark)}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:14px 24px;border-radius:999px;font-size:14px;font-weight:600;box-shadow:var(--shadow);z-index:200;opacity:0;transition:.35s;display:flex;align-items:center;gap:10px}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast svg{color:#5fd6a8}
.spinner{width:16px;height:16px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <a class="logo" href="/"><span class="dot"></span>Aula Virtual</a>
    <a class="nav-link" href="/">Explorar cursos</a>
    <div class="spacer"></div>
    <div class="greet-h">
      <div class="av" id="h-av">··</div>
      <b id="h-name">Usuario</b>
    </div>
    <button class="logout" onclick="logout()">Cerrar sesión</button>
  </div>
</header>

<div class="hero">
  <div class="wrap">
    <h1 id="saludo">Mi aprendizaje</h1>
    <p>Retoma donde lo dejaste y mantén tu racha.</p>
  </div>
</div>

<div class="wrap">
  <div class="top-cards">
    <div class="streak">
      <div class="top">
        <div class="flame">
          <div class="ico"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg></div>
          <div><div class="n" id="racha-n">0</div><small>días de racha</small></div>
        </div>
      </div>
      <div class="week" id="week"></div>
      <div class="reg">
        <button onclick="abrirRegistro()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>Registrar tiempo de estudio</button>
      </div>
    </div>
    <div class="mini">
      <div class="ic" style="background:var(--accent-soft);color:var(--accent)"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
      <div class="n" id="min-semana">0</div>
      <div class="l">minutos esta semana</div>
    </div>
    <div class="mini">
      <div class="ic" style="background:var(--amber-soft);color:#a8620a"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a7 7 0 1 0 0-14 7 7 0 0 0 0 14z"/><path d="M8.21 13.89L7 23l5-3 5 3-1.21-9.12"/></svg></div>
      <div class="n" id="completados">0</div>
      <div class="l">cursos completados</div>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="cursos" onclick="cambiarTab('cursos')">Mis cursos <span class="count" id="c-cursos">0</span></button>
    <button class="tab" data-tab="favoritos" onclick="cambiarTab('favoritos')">Favoritos <span class="count" id="c-fav">0</span></button>
    <button class="tab" data-tab="archivados" onclick="cambiarTab('archivados')">Archivados <span class="count" id="c-arch">0</span></button>
    <button class="tab" data-tab="vias" onclick="cambiarTab('vias')">Vías de aprendizaje</button>
    <button class="tab" data-tab="certs" onclick="cambiarTab('certs')">Certificaciones</button>
  </div>

  <div class="filters" id="filters">
    <label class="fsearch">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" placeholder="Buscar en mis cursos…" oninput="aplicarFiltros()">
    </label>
    <select id="f-cat" onchange="aplicarFiltros()">
      <option value="">Todas las categorías</option>
      <option value="Programación">Programación</option>
      <option value="Diseño">Diseño</option>
      <option value="Negocios">Negocios</option>
      <option value="Marketing">Marketing</option>
      <option value="Ciencia de Datos">Ciencia de Datos</option>
      <option value="Idiomas">Idiomas</option>
      <option value="Foto y Video">Foto y Video</option>
      <option value="Música">Música</option>
    </select>
    <select id="f-estado" onchange="aplicarFiltros()">
      <option value="">Cualquier progreso</option>
      <option value="new">Sin empezar</option>
      <option value="progress">En progreso</option>
      <option value="done">Completados</option>
    </select>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="modal-bg" id="modal-reg">
  <div class="modal">
    <button class="x" onclick="cerrarRegistro()">×</button>
    <h2>Registrar tiempo</h2>
    <p class="msub">¿Cuántos minutos estudiaste hoy? Se sumarán a tu racha.</p>
    <label>Minutos</label>
    <input id="reg-min" type="number" min="1" placeholder="Ej. 30">
    <div class="chips">
      <button onclick="setMin(15)">15 min</button>
      <button onclick="setMin(30)">30 min</button>
      <button onclick="setMin(45)">45 min</button>
      <button onclick="setMin(60)">60 min</button>
    </div>
    <div class="modal-actions">
      <button class="b-ghost" onclick="cerrarRegistro()">Cancelar</button>
      <button class="b-solid" id="reg-save" onclick="guardarRegistro()">Registrar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg><span id="toast-txt">Listo</span></div>

<script>
const API = window.location.origin;
const TOKEN = localStorage.getItem('avs_token');
const SESION = JSON.parse(localStorage.getItem('avs_usuario') || 'null');

if (!TOKEN || !SESION) window.location.href = '/login.html';

const grads=['linear-gradient(135deg,#5b34d6,#9b6dff)','linear-gradient(135deg,#16a37a,#5fd6a8)','linear-gradient(135deg,#e8a317,#f7cf6b)','linear-gradient(135deg,#d6347c,#ff8fc0)','linear-gradient(135deg,#3470d6,#7fb0ff)','linear-gradient(135deg,#7a34d6,#c08fff)','linear-gradient(135deg,#0f9b8e,#5fd6cc)','linear-gradient(135deg,#d65334,#ff9b7f)'];
const DOW = ['Do','Lu','Ma','Mi','Ju','Vi','Sá'];

let tabActual = 'cursos';
let cacheInscripciones = [];   // todas las del usuario (para contadores)

function iniciales(n){ return n.trim().split(/\s+/).map(p=>p[0]).slice(0,2).join('').toUpperCase(); }

async function api(metodo, ruta, cuerpo){
  const opts = { method: metodo, headers: { Authorization: 'Bearer ' + TOKEN } };
  if (cuerpo !== undefined) { opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(cuerpo); }
  const resp = await fetch(API + ruta, opts);
  if (resp.status === 401) { logout(); throw new Error('Sesión expirada'); }
  const data = await resp.json().catch(()=>({}));
  if (!resp.ok) { const e=new Error(data.error||'Error'); e.codigo=data.codigo; throw e; }
  return data;
}

// ---- Rachas / resumen ----
async function cargarActividad(){
  try {
    const d = await api('GET', '/api/actividad');
    document.getElementById('racha-n').textContent = d.racha_dias;
    document.getElementById('min-semana').textContent = d.minutos_semana;
    // strip de 7 días
    const mapa = new Map(d.actividad.map(x=>[x.fecha, x.minutos]));
    const hoy = new Date();
    let html = '';
    for (let i=6;i>=0;i--){
      const dt = new Date(hoy); dt.setDate(hoy.getDate()-i);
      const key = dt.toISOString().slice(0,10);
      const min = mapa.get(key) || 0;
      html += `<div class="day ${min>0?'on':''} ${i===0?'today':''}"><div class="d">${min>0?'✓':''}</div><span>${DOW[dt.getDay()]}</span></div>`;
    }
    document.getElementById('week').innerHTML = html;
  } catch(e){ /* si falla, la sección queda en 0 */ }
}

// ---- Contadores de pestañas ----
async function cargarContadores(){
  try {
    const d = await api('GET', '/api/inscripciones');
    cacheInscripciones = d.inscripciones;
    const noArch = cacheInscripciones.filter(i=>!i.archivado);
    document.getElementById('c-cursos').textContent = noArch.length;
    document.getElementById('c-fav').textContent = cacheInscripciones.filter(i=>i.favorito).length;
    document.getElementById('c-arch').textContent = cacheInscripciones.filter(i=>i.archivado).length;
    document.getElementById('completados').textContent = cacheInscripciones.filter(i=>i.progreso===100).length;
  } catch(e){}
}

// ---- Tabs ----
function cambiarTab(tab){
  tabActual = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===tab));
  document.getElementById('filters').style.display = (tab==='cursos') ? 'flex' : 'none';
  if (tab==='vias' || tab==='certs') { renderProximamente(tab); return; }
  cargarCursos();
}

function renderProximamente(tab){
  const txt = tab==='vias'
    ? {h:'Vías de aprendizaje', p:'Pronto podrás seguir rutas de cursos ordenadas paso a paso hacia un objetivo.'}
    : {h:'Certificaciones', p:'Al completar tus cursos, aquí aparecerán tus certificados descargables.'};
  document.getElementById('grid').innerHTML = `<div class="state">
    <div class="ic"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 2"/></svg></div>
    <h3>${txt.h}</h3><p>${txt.p}</p></div>`;
}

// ---- Cursos ----
async function cargarCursos(){
  const grid = document.getElementById('grid');
  grid.innerHTML = Array.from({length:3}).map(()=>'<div class="skel"></div>').join('');

  const qs = new URLSearchParams();
  if (tabActual==='archivados') qs.set('archivado','true');
  else if (tabActual==='favoritos') qs.set('favorito','true');
  else { // mis cursos: no archivados + filtros
    qs.set('archivado','false');
    const q = document.getElementById('q').value.trim();
    const cat = document.getElementById('f-cat').value;
    const est = document.getElementById('f-estado').value;
    if (q) qs.set('q', q);
    if (cat) qs.set('categoria', cat);
    if (est) qs.set('estado', est);
  }

  try {
    const d = await api('GET', '/api/inscripciones?' + qs.toString());
    if (!d.inscripciones.length) { renderVacio(); return; }
    grid.innerHTML = d.inscripciones.map((c,i)=>tarjeta(c,i)).join('');
  } catch(e){
    grid.innerHTML = `<div class="state"><h3>No se pudo cargar</h3><p>${e.message}. ¿Está corriendo el servidor?</p></div>`;
  }
}

function tarjeta(c, i){
  const pct = c.progreso || 0;
  const done = pct === 100;
  return `<div class="card">
    <div class="thumb" style="background:${grads[(c.curso_id-1)%grads.length]}">
      <span class="tag">${c.categoria||'Curso'}</span>
      <button class="fav ${c.favorito?'on':''}" title="Favorito" onclick="toggleFav(${c.id}, ${!c.favorito})">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="${c.favorito?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M12 2l3 7h7l-5.5 4 2 7L12 17l-6.5 3 2-7L2 9h7z"/></svg>
      </button>
    </div>
    <div class="body">
      <h3>${c.titulo}</h3>
      <div class="tutor">${c.instructor}</div>
      <div class="progress"><div class="bar ${done?'done':''}" style="width:${pct}%"></div></div>
      <div class="prow"><span><b>${pct}%</b> completado</span>${done?'<span style="color:var(--accent);font-weight:700">¡Terminado!</span>':''}</div>
      <div class="acts">
        <button class="btn-cont ${done?'done':''}" onclick="continuar(${c.curso_id}, ${c.id})">${done?'Repasar':'Continuar'}</button>
        <button class="ic-act" title="${tabActual==='archivados'?'Desarchivar':'Archivar'}" onclick="toggleArch(${c.id}, ${!c.archivado})">
          ${tabActual==='archivados'
            ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v4H3zM5 7v13h14V7M10 12h4"/></svg>'
            : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8v13H3V8M1 3h22v5H1zM10 12h4"/></svg>'}
        </button>
      </div>
    </div>
  </div>`;
}

function renderVacio(){
  const msg = {
    cursos: {h:'Aún no tienes cursos aquí', p:'Explora el catálogo y empieza a aprender.', cta:true},
    favoritos: {h:'Sin favoritos todavía', p:'Marca tus cursos con la estrella para encontrarlos rápido.'},
    archivados: {h:'Nada archivado', p:'Los cursos que archives aparecerán aquí.'},
  }[tabActual] || {h:'Sin resultados', p:'Prueba con otros filtros.'};
  document.getElementById('grid').innerHTML = `<div class="state">
    <div class="ic"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
    <h3>${msg.h}</h3><p>${msg.p}${msg.cta?' <a onclick="location.href=\\'/\\'">Ir al catálogo →</a>':''}</p></div>`;
}

function aplicarFiltros(){ if (tabActual==='cursos') cargarCursos(); }

// ---- Acciones ----
async function toggleFav(id, valor){
  try { await api('PUT', '/api/inscripciones/'+id, { favorito: valor }); toast(valor?'Añadido a favoritos':'Quitado de favoritos'); await refrescar(); }
  catch(e){ toast(e.message); }
}
async function toggleArch(id, valor){
  try { await api('PUT', '/api/inscripciones/'+id, { archivado: valor }); toast(valor?'Curso archivado':'Curso desarchivado'); await refrescar(); }
  catch(e){ toast(e.message); }
}
function continuar(cursoId, inscripcionId){
  location.href = `/reproductor.html?curso=${cursoId}&inscripcion=${inscripcionId}`;
}

async function refrescar(){ await cargarContadores(); if(tabActual==='cursos'||tabActual==='favoritos'||tabActual==='archivados') cargarCursos(); }

// ---- Registrar tiempo ----
function abrirRegistro(){ document.getElementById('reg-min').value=''; document.getElementById('modal-reg').classList.add('show'); }
function cerrarRegistro(){ document.getElementById('modal-reg').classList.remove('show'); }
function setMin(m){ document.getElementById('reg-min').value = m; }
async function guardarRegistro(){
  const min = parseInt(document.getElementById('reg-min').value, 10);
  if (!min || min<=0){ toast('Escribe un número de minutos válido'); return; }
  const btn = document.getElementById('reg-save');
  btn.innerHTML = '<span class="spinner"></span>'; btn.disabled = true;
  try { await api('POST','/api/actividad',{ minutos: min }); cerrarRegistro(); toast(`+${min} min registrados`); await cargarActividad(); }
  catch(e){ toast(e.message); }
  finally { btn.textContent='Registrar'; btn.disabled=false; }
}
document.getElementById('modal-reg').addEventListener('click', e=>{ if(e.target.id==='modal-reg') cerrarRegistro(); });

function logout(){ localStorage.removeItem('avs_token'); localStorage.removeItem('avs_usuario'); location.href='/login.html'; }

let tT;
function toast(msg){ const t=document.getElementById('toast'); document.getElementById('toast-txt').textContent=msg; t.classList.add('show'); clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('show'),2600); }

// ---- Init ----
document.getElementById('h-av').textContent = iniciales(SESION.nombre);
document.getElementById('h-name').textContent = SESION.nombre.split(' ')[0];
document.getElementById('saludo').textContent = `Hola, ${SESION.nombre.split(' ')[0]}`;
cargarActividad();
cargarContadores().then(cargarCursos);
</script>
</body>
